name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /PROJECT-MANAGER/
          SITE_URL: https://aaruthrun-beep.github.io
          PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_aW50ZW5zZS1iYWJvb24tNDMuY2xlcmsuYWNjb3VudHMuZGV2JA
          PUBLIC_IMGBB_API_KEY: 05bfed9dc27a476adb73e2814fa5efaa
          PUBLIC_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PUBLIC_TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PUBLIC_AUTHORIZED_EMAIL: aaruthrun@gmail.com
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
